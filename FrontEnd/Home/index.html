<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คิดให้ไววิ่งให้ทัน</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background">
    <img src="../picture/Cloud.png" alt="Decorative cloud" id="cloud-left" width="280" height="auto">
    <img src="../picture/Cloud.png" alt="Decorative cloud" id="cloud-right" width="280" height="auto">
    <img src="../picture/sun.png" alt="Decorative sun" id="sun" width="200" height="auto">
  </div>
  <div class="run">
    <img src="../picture/running.png" alt="Character running animation" id="boyRun" width="350" height="auto">
  </div>
  <main class="container">
    <h1>คิดให้ไววิ่งให้ทัน</h1>
    <h2>(MATH RUNNER)</h2>

    <nav class="btn">
      <button id="start-btn" class="mainbtn">เริ่มเกม</button>  
  </nav>
    
    <nav class="sub-btn" >
      <button id="setting-btn" aria-label="Settings" class="mainbtn">
        <img src="../picture/setting.png" alt="" width="35" height="35" >
      </button>
      <button id="leaderbord-btn" aria-label="Leaderboard" class="mainbtn">
        <img src="../picture/trophy.png" alt="" width="35" height="35" >
      </button>
    </nav>
  </main>
  <script src="script.js"></script>
</body>
</html>
